name: toempah_rempah
description: Toempah Rempah — Cross-Platform POS & Accounting System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.2.0

  # Supabase
  supabase_flutter: ^2.5.3

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  intl: ^0.19.0

  pdf: ^3.11.1
  printing: ^5.13.0

  # Utilities
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  uuid: ^4.3.3
  equatable: ^2.0.5
  cached_network_image: ^3.4.1
  fl_chart: ^1.2.0
  image_picker: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.8
  freezed: ^2.5.2
  json_serializable: ^6.7.1
  riverpod_generator: ^2.4.0

  http: any
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: false
  ios: false
  web:
    generate: true
    image_path: "assets/icon.png"
    background_color: "#1a1b15"
    theme_color: "#1a1b15"
  windows:
    generate: true
    image_path: "assets/icon.png"
    icon_size: 48
  image_path: "assets/icon.png"
  min_sdk_android: 21
flutter:
  uses-material-design: true
